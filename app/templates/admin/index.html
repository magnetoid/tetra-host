{% extends "base.html" %}
{% block title %}Customers · Cloud Industry{% endblock %}
{% block content %}
<h1 class="text-3xl font-bold">Customers</h1><p class="mt-2 text-zinc-400">Tenants and account isolation.</p>
<div class="mt-6 grid gap-4">{% for t in tenants %}<div class="rounded-xl border border-border bg-muted p-5"><div class="font-semibold">{{ t.name }}</div><div class="mt-1 text-sm text-zinc-400">Plan: {{ t.plan }} · Sites: {{ t.sites }}</div></div>{% endfor %}</div>
{% endblock %}
