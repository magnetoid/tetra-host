# Alembic configuration for Tetra Host.
#
# The database URL is intentionally NOT set here — env.py reads it from the
# application Settings (app.config.get_settings) so migrations use the exact
# same DATABASE_URL as the running app (and the same async-driver
# normalisation). Run migrations with the project venv, e.g.:
#
#     .venv/bin/alembic upgrade head
#     .venv/bin/alembic revision --autogenerate -m "add widget table"
#
# See docs/OPERATIONS.md → "Database migrations" for the deploy workflow.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# Timezone-naive UTC timestamps in generated revision files.
timezone = UTC
version_path_separator = os
# Autogenerated revisions are linted by the normal `ruff check .` in CI; no
# post-write hook (keeps revision generation dependency-free and predictable).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
